<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | LIFOSS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="profile-body">
    <style>
        .profile-body { background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%); background-size: 200% 200%; animation: gradientBG 15s ease infinite; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-bottom: 3rem; color: #212121; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .p-header { background: rgba(255,255,255,0.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 1.2rem 3rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 30px rgba(0,0,0,0.05); border-bottom: 1px solid rgba(255,255,255,0.4); position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        .p-logo { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800; color: #1e3a8a; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; letter-spacing: -1px; }
        .p-container { max-width: 1100px; margin: 3rem auto 0; padding: 0 2rem; }
        .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 24px; padding: 3rem; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        
        .contact-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 3rem; margin-top: 2rem; }
        .contact-info-side h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; color: #111; margin-bottom: 1rem; }
        .contact-info-side p { color: #555; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; }
        
        .info-card { background: rgba(255,255,255,0.4); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; display: flex; gap: 1rem; align-items: center; border: 1px solid rgba(255,255,255,0.6); }
        .info-card i { font-size: 1.5rem; color: #3b82f6; width: 40px; text-align: center; }
        .info-card h4 { font-size: 0.85rem; text-transform: uppercase; color: #777; margin: 0; letter-spacing: 0.5px; }
        .info-card p { font-size: 1.05rem; font-weight: 700; color: #111; margin: 0; }
        
        .contact-form { background: rgba(255,255,255,0.5); border-radius: 20px; padding: 2.5rem; border: 1px solid white; box-shadow: 0 8px 30px rgba(0,0,0,0.03); }
        .form-group { margin-bottom: 1.2rem; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; color: #444; margin-bottom: 8px; }
        .floral-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.6); border: 2px solid rgba(255,255,255,0.8); border-radius: 12px; font-size: 0.95rem; font-weight: 600; outline: none; transition: 0.3s; }
        .floral-input:focus { background: white; border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
        textarea.floral-input { min-height: 140px; }
        
        .submit-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; padding: 16px 30px; width: 100%; border-radius: 12px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(59,130,246,0.4); }

        .nav-footer { display: flex; justify-content: center; gap: 2rem; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(0,0,0,0.1); }
        .nav-link { color: #1e3a8a; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .nav-link:hover { color: #3b82f6; }
    </style>

    <header class="p-header">
        <a href="index.html" class="p-logo"><i class="fa-solid fa-shapes"></i> LIFOSS</a>
        <a href="index.html" style="color: #444; text-decoration: none; font-weight: 600;"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </header>

    <div class="p-container">
        <div class="glass-panel">
            <div class="contact-grid">
                <div class="contact-info-side">
                    <h1>Get in Touch</h1>
                    <p>Have a question or just want to say hi? We'd love to hear from you. Our team typically responds within 4 hours.</p>
                    
                    <div class="info-card">
                        <i class="fa-solid fa-phone"></i>
                        <div>
                            <h4>Phone</h4>
                            <p>+91 81447 42255</p>
                        </div>
                    </div>
                    <div class="info-card">
                        <i class="fa-solid fa-envelope"></i>
                        <div>
                            <h4>Email</h4>
                            <p>sandeeprana9832@gmail.com</p>
                        </div>
                    </div>
                    <div class="info-card">
                        <i class="fa-solid fa-location-dot"></i>
                        <div>
                            <h4>Headquarters</h4>
                            <p>New Delhi, India</p>
                        </div>
                    </div>
                </div>

                <div class="contact-form">
                    <div class="form-group">
                        <label class="form-label">FULL NAME</label>
                        <input type="text" class="floral-input" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">EMAIL ADDRESS</label>
                        <input type="email" class="floral-input" placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">YOUR MESSAGE</label>
                        <textarea class="floral-input" placeholder="How can we help?"></textarea>
                    </div>
                    <button class="submit-btn" onclick="this.innerText='Sending...'; setTimeout(()=> {this.innerText='Message Sent! ✨'; this.style.background='#10b981'}, 1500)">SEND MESSAGE</button>
                </div>
            </div>

            <div class="nav-footer">
                <a href="about.html" class="nav-link">About Us</a>
                <a href="careers.html" class="nav-link">Careers</a>
                <a href="support.html" class="nav-link">Support</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from(".glass-panel", { y: 30, opacity: 0, duration: 0.8, ease: "power3.out" });
            gsap.from(".info-card", { x: -30, opacity: 0, duration: 0.6, stagger: 0.1, delay: 0.4 });
            gsap.from(".contact-form", { x: 30, opacity: 0, duration: 0.6, delay: 0.5 });
        });
    </script>
</body>
</html>
